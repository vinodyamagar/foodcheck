name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 18.x
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          cache: 'npm'

      - name: Install and test server
        run: |
          npm -C server ci
          npm -C server test -q

      - name: Install and build client
        run: |
          npm -C client ci
          npm -C client run build
